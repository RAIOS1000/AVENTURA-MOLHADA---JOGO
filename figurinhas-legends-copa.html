<script>
'use strict';

// ─── COLOR UTILS ─────────────────────────────────────────
function br(hex, amt) {
  let r = parseInt(hex.slice(1,3),16),
      g = parseInt(hex.slice(3,5),16),
      b = parseInt(hex.slice(5,7),16);
  r = Math.max(0,Math.min(255,r+amt));
  g = Math.max(0,Math.min(255,g+amt));
  b = Math.max(0,Math.min(255,b+amt));
  return `rgb(${r},${g},${b})`;
}
function ha(hex, a) {
  const r=parseInt(hex.slice(1,3),16),
        g=parseInt(hex.slice(3,5),16),
        b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawStar5(ctx, x, y, r1, r2) {
  ctx.beginPath();
  for (let i=0;i<10;i++) {
    const a = (i*Math.PI/5) - Math.PI/2;
    const r = i%2===0 ? r2 : r1;
    i===0 ? ctx.moveTo(x+Math.cos(a)*r, y+Math.sin(a)*r)
          : ctx.lineTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
  }
  ctx.closePath();
}

// ─── PRISMATIC BORDER ────────────────────────────────────
function drawPrismaticBorder(ctx, S, bw, angle) {
  // angle shifts the hue cycle per card
  const colors = [
    '#ff0066','#ff4400','#ffcc00','#00ff88',
    '#00ccff','#6600ff','#ff0066'
  ];
  // thick colored stroke as border
  const grd = ctx.createLinearGradient(0, 0, S, S);
  const shift = (angle||0) / 360;
  colors.forEach((c, i) => {
    let t = (i/(colors.length-1) + shift) % 1;
    grd.addColorStop(i/(colors.length-1), colors[Math.round(t*(colors.length-1))]);
  });

  // Outer silver stroke
  ctx.save();
  rr(ctx, 0, 0, S, S, 30);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = bw + 4;
  ctx.stroke();

  // Rainbow gradient stroke
  rr(ctx, 2, 2, S-4, S-4, 28);
  ctx.strokeStyle = grd;
  ctx.lineWidth = bw;
  ctx.stroke();

  // Inner bright ring
  rr(ctx, bw/2-1, bw/2-1, S-bw+2, S-bw+2, 24);
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.restore();
}

// ─── BACKGROUND ──────────────────────────────────────────
function drawBackground(ctx, S, BW, c1, c2) {
  ctx.save();
  rr(ctx, BW, BW, S-BW*2, S-BW*2, 22);
  ctx.clip();

  // Dark base
  ctx.fillStyle = '#06060f';
  ctx.fillRect(BW, BW, S-BW*2, S-BW*2);

  // Team color radial glow
  const grad = ctx.createRadialGradient(S/2, S*0.38, 20, S/2, S*0.38, 240);
  grad.addColorStop(0, ha(c1, 0.6));
  grad.addColorStop(0.5, ha(c1, 0.25));
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(BW, BW, S-BW*2, S-BW*2);

  // Speed lines radiating from player center
  const cx = S/2, cy = S*0.38;
  ctx.save();
  for (let i=0;i<24;i++) {
    const a = (i/24)*Math.PI*2;
    const d1 = 50, d2 = 280;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*d1, cy+Math.sin(a)*d1);
    ctx.lineTo(cx+Math.cos(a)*d2, cy+Math.sin(a)*d2);
    ctx.strokeStyle = ha(c1, 0.08 + (i%2)*0.04);
    ctx.lineWidth = 1 + (i%3)*0.5;
    ctx.stroke();
  }
  ctx.restore();

  // Diagonal grid texture
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x=BW-20; x < S; x+=20) {
    ctx.beginPath(); ctx.moveTo(x,BW); ctx.lineTo(x+80,S-BW); ctx.stroke();
  }
  ctx.restore();

  ctx.restore();
}

// ─── TOP STRIP ───────────────────────────────────────────
function drawTopStrip(ctx, S, BW, c1, c2, pos, ovr) {
  const y = BW, h = 48, x = BW, w = S - BW*2;

  ctx.save();
  rr(ctx, x, y, w, h, 22);
  ctx.clip();

  const tg = ctx.createLinearGradient(x, y, x+w, y+h);
  tg.addColorStop(0, 'rgba(0,0,0,0.85)');
  tg.addColorStop(1, ha(c1, 0.6));
  ctx.fillStyle = tg;
  ctx.fillRect(x, y, w, h);

  // COPA 2026
  ctx.font = 'bold 11px Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.textAlign = 'left';
  ctx.fillText('COPA 2026', x+14, y+16);

  // LEGENDS badge
  ctx.font = 'bold 10px Arial';
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'center';
  ctx.fillText('✦ LEGENDS ✦', S/2, y+17);

  // Stars row
  for (let i=0;i<5;i++) {
    drawStar5(ctx, x+14 + i*16, y+35, 4, 8);
    ctx.fillStyle = '#FFD700';
    ctx.fill();
  }

  // Position badge
  rr(ctx, S-BW-48, y+8, 40, 22, 5);
  ctx.fillStyle = ha(c2, 0.85) || 'rgba(255,255,255,0.85)';
  ctx.fill();
  ctx.font = 'bold 11px Arial';
  ctx.fillStyle = '#111';
  ctx.textAlign = 'center';
  ctx.fillText(pos, S-BW-28, y+23);

  ctx.restore();
}

// ─── RATING BADGE ────────────────────────────────────────
function drawRating(ctx, S, BW, ovr, c1) {
  const cx = BW + 38, cy = BW + 88;
  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, 26, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fill();
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  // Inner fill
  ctx.beginPath();
  ctx.arc(cx, cy, 21, 0, Math.PI*2);
  const rg = ctx.createRadialGradient(cx-5, cy-5, 2, cx, cy, 21);
  rg.addColorStop(0, br(c1, 60));
  rg.addColorStop(1, c1);
  ctx.fillStyle = rg;
  ctx.fill();
  // Number
  ctx.font = 'bold 20px Arial Black, Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 4;
  ctx.fillText(ovr, cx, cy+7);
  ctx.shadowBlur = 0;
  // OVR label
  ctx.font = '7px Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('OVR', cx, cy+19);
}

// ─── BOTTOM NAME STRIP ───────────────────────────────────
function drawNameStrip(ctx, S, BW, name, team, c1, c2, num, flagFn) {
  const y = S - BW - 90, h = 46, x = BW, w = S - BW*2;

  ctx.save();

  // Team color strip
  const sg = ctx.createLinearGradient(x, y, x+w, y+h);
  sg.addColorStop(0, ha(c1, 0.95));
  sg.addColorStop(1, ha(c1, 0.7));
  ctx.fillStyle = sg;
  ctx.fillRect(x, y, w, h);

  // Metallic sheen overlay
  const msh = ctx.createLinearGradient(x, y, x, y+h);
  msh.addColorStop(0, 'rgba(255,255,255,0.22)');
  msh.addColorStop(0.4, 'rgba(255,255,255,0.04)');
  msh.addColorStop(1, 'rgba(0,0,0,0.2)');
  ctx.fillStyle = msh;
  ctx.fillRect(x, y, w, h);

  // Player name
  ctx.font = 'bold 24px Arial Black, Arial';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#ffffff';
  ctx.fillText(name, S/2, y + 32);
  ctx.shadowBlur = 0;

  // Country strip (darker)
  const cy2 = y + h, h2 = 34;
  const dg = ctx.createLinearGradient(x, cy2, x+w, cy2+h2);
  dg.addColorStop(0, 'rgba(0,0,0,0.88)');
  dg.addColorStop(1, ha(c1, 0.45));
  ctx.fillStyle = dg;
  ctx.fillRect(x, cy2, w, h2);

  // Team name
  ctx.font = 'bold 12px Arial';
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'center';
  ctx.fillText(team.toUpperCase(), S/2, cy2 + 16);

  // Card number
  ctx.font = '9px Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.textAlign = 'right';
  ctx.fillText(`#${num}/100`, S - BW - 8, cy2 + 28);

  // Flag colors bar (3px strip at bottom)
  if (flagFn) flagFn(ctx, x, cy2+h2-4, w, 4);

  ctx.restore();
}

// ─── LEGEND STAMP ────────────────────────────────────────
function drawLegendStamp(ctx, S, BW) {
  const x = S - BW - 80, y = S - BW - 152;
  ctx.save();
  ctx.translate(x+40, y+20);
  ctx.rotate(0.25);
  rr(ctx, -36, -14, 72, 28, 6);
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,215,0,0.12)';
  ctx.fill();
  ctx.font = 'bold 11px Arial';
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'center';
  ctx.fillText('✦ LEGEND ✦', 0, 5);
  ctx.restore();
}

// ─── GLOW BEHIND PLAYER ──────────────────────────────────
function drawPlayerGlow(ctx, cx, cy, c1) {
  const g = ctx.createRadialGradient(cx, cy, 10, cx, cy, 160);
  g.addColorStop(0, ha(c1, 0.5));
  g.addColorStop(0.4, ha(c1, 0.2));
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(cx, cy, 160, 0, Math.PI*2);
  ctx.fill();
}

// ─── PLAYER FIGURE: CELEBRATION ──────────────────────────
function figureCelebration(ctx, cx, cy, sc, jersey, shorts, skin, hair) {
  const s = sc;
  ctx.save();
  ctx.translate(cx, cy);

  // Shadow
  ctx.beginPath();
  ctx.ellipse(0, 148*s, 52*s, 12*s, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();

  // Boots
  [[−1],[1]].forEach(([side]) => {
    const bx = side * 36 * s;
    ctx.beginPath();
    ctx.moveTo(bx - 16*s, 126*s);
    ctx.bezierCurveTo(bx - 22*s, 128*s, bx - 26*s, 140*s, bx - 18*s, 148*s);
    ctx.bezierCurveTo(bx - 10*s, 154*s, bx + 14*s, 152*s, bx + 18*s, 144*s);
    ctx.bezierCurveTo(bx + 20*s, 136*s, bx + 14*s, 126*s, bx + 6*s, 126*s);
    ctx.closePath();
    ctx.fillStyle = '#0d0d1e';
    ctx.fill();
    // boot highlight
    ctx.beginPath();
    ctx.moveTo(bx - 20*s, 132*s);
    ctx.bezierCurveTo(bx - 14*s, 126*s, bx - 4*s, 124*s, bx + 4*s, 126*s);
    ctx.strokeStyle = 'rgba(255,255,255,0.28)';
    ctx.lineWidth = 2*s;
    ctx.stroke();
  });

  // Socks
  [[−1],[1]].forEach(([side]) => {
    const sx = side * 26 * s;
    ctx.beginPath();
    ctx.moveTo(sx - 14*s, 28*s);
    ctx.bezierCurveTo(sx - 16*s, 75*s, sx - 18*s, 110*s, sx - 14*s, 130*s);
    ctx.lineTo(sx + 10*s, 130*s);
    ctx.bezierCurveTo(sx + 8*s, 108*s, sx + 4*s, 72*s, sx + 8*s, 28*s);
    ctx.closePath();
    const sg = ctx.createLinearGradient(sx-16*s,28*s, sx+8*s,130*s);
    sg.addColorStop(0, br(shorts, 20));
    sg.addColorStop(1, br(shorts, -30));
    ctx.fillStyle = sg;
    ctx.fill();
  });

  // Shorts
  ctx.beginPath();
  ctx.moveTo(-44*s, -10*s);
  ctx.lineTo(44*s, -10*s);
  ctx.bezierCurveTo(44*s, 16*s, 38*s, 32*s, 30*s, 34*s);
  ctx.lineTo(-30*s, 34*s);
  ctx.bezierCurveTo(-38*s, 32*s, -44*s, 16*s, -44*s, -10*s);
  ctx.closePath();
  const shg = ctx.createLinearGradient(-44*s, -10*s, 44*s, 34*s);
  shg.addColorStop(0, br(shorts, 25));
  shg.addColorStop(1, br(shorts, -35));
  ctx.fillStyle = shg;
  ctx.fill();

  // Jersey body
  ctx.beginPath();
  ctx.moveTo(-50*s, -80*s);
  ctx.bezierCurveTo(-52*s, -55*s, -48*s, -22*s, -44*s, -10*s);
  ctx.lineTo(44*s, -10*s);
  ctx.bezierCurveTo(48*s, -22*s, 52*s, -55*s, 50*s, -80*s);
  ctx.bezierCurveTo(30*s, -96*s, 14*s, -100*s, 0, -100*s);
  ctx.bezierCurveTo(-14*s, -100*s, -30*s, -96*s, -50*s, -80*s);
  ctx.closePath();
  const jg = ctx.createLinearGradient(-52*s, -100*s, 52*s, -10*s);
  jg.addColorStop(0, br(jersey, 40));
  jg.addColorStop(0.45, jersey);
  jg.addColorStop(1, br(jersey, -30));
  ctx.fillStyle = jg;
  ctx.fill();
  // Jersey sheen
  ctx.beginPath();
  ctx.moveTo(-20*s, -100*s);
  ctx.bezierCurveTo(-5*s, -80*s, -22*s, -38*s, -42*s, -12*s);
  ctx.lineTo(-48*s, -15*s);
  ctx.bezierCurveTo(-26*s, -42*s, -8*s, -82*s, -28*s, -102*s);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.14)';
  ctx.fill();

  // Left arm (raised)
  ctx.beginPath();
  ctx.moveTo(-50*s, -76*s);
  ctx.bezierCurveTo(-72*s, -98*s, -102*s, -132*s, -98*s, -170*s);
  ctx.bezierCurveTo(-96*s, -184*s, -82*s, -188*s, -74*s, -178*s);
  ctx.bezierCurveTo(-76*s, -142*s, -52*s, -110*s, -34*s, -84*s);
  ctx.closePath();
  const ag = ctx.createLinearGradient(-102*s, -188*s, -30*s, -76*s);
  ag.addColorStop(0, br(jersey, 30));
  ag.addColorStop(1, br(jersey, -15));
  ctx.fillStyle = ag;
  ctx.fill();

  // Right arm (raised)
  ctx.beginPath();
  ctx.moveTo(50*s, -76*s);
  ctx.bezierCurveTo(72*s, -98*s, 102*s, -132*s, 98*s, -170*s);
  ctx.bezierCurveTo(96*s, -184*s, 82*s, -188*s, 74*s, -178*s);
  ctx.bezierCurveTo(76*s, -142*s, 52*s, -110*s, 34*s, -84*s);
  ctx.closePath();
  ctx.fillStyle = ag;
  ctx.fill();

  // Hands
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(-86*s, -180*s, 14*s, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(86*s, -180*s, 14*s, 0, Math.PI*2); ctx.fill();

  // Neck
  ctx.beginPath();
  ctx.moveTo(-13*s, -98*s);
  ctx.lineTo(13*s, -98*s);
  ctx.lineTo(11*s, -76*s);
  ctx.lineTo(-11*s, -76*s);
  ctx.closePath();
  ctx.fillStyle = skin;
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.arc(0, -126*s, 38*s, 0, Math.PI*2);
  ctx.fillStyle = skin;
  ctx.fill();
  // Face sheen
  ctx.beginPath();
  ctx.arc(-10*s, -133*s, 22*s, -0.5, 0.9);
  ctx.fillStyle = 'rgba(255,230,200,0.18)';
  ctx.fill();
  // Hair
  ctx.beginPath();
  ctx.arc(0, -136*s, 38*s, Math.PI+0.25, -0.25);
  ctx.closePath();
  ctx.fillStyle = hair;
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-13*s,-126*s,6*s,5*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(13*s,-126*s,6*s,5*s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(-12*s,-126*s,3.5*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(12*s,-126*s,3.5*s,0,Math.PI*2); ctx.fill();
  // Open smile
  ctx.beginPath();
  ctx.arc(0, -114*s, 14*s, 0.1, Math.PI-0.1);
  ctx.fillStyle = '#cc2222';
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3*s;
  ctx.stroke();

  ctx.restore();
}

// ─── PLAYER FIGURE: SHOOTING ─────────────────────────────
function figureShooting(ctx, cx, cy, sc, jersey, shorts, skin, hair) {
  const s = sc;
  ctx.save();
  ctx.translate(cx, cy);

  // Shadow
  ctx.beginPath();
  ctx.ellipse(-10*s, 148*s, 50*s, 11*s, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();

  // Ball (at feet, right side)
  ctx.beginPath();
  ctx.arc(55*s, 120*s, 22*s, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 10;
  ctx.fill();
  ctx.shadowBlur = 0;
  // Ball patches
  ctx.fillStyle = '#111';
  [[0,0],[0,-0.65],[0.56,-0.4],[-0.56,-0.4],[0.56,0.4],[-0.56,0.4]].forEach(([ox,oy]) => {
    ctx.beginPath();
    ctx.arc(55*s+ox*18*s, 120*s+oy*18*s, 6*s, 0, Math.PI*2);
    ctx.fill();
  });

  // Supporting left leg (planted)
  ctx.beginPath();
  ctx.moveTo(-20*s, 28*s);
  ctx.bezierCurveTo(-24*s, 78*s, -28*s, 112*s, -26*s, 130*s);
  ctx.lineTo(-8*s, 130*s);
  ctx.bezierCurveTo(-8*s, 110*s, -4*s, 76*s, -4*s, 28*s);
  ctx.closePath();
  const lg1 = ctx.createLinearGradient(-28*s,28*s,-4*s,130*s);
  lg1.addColorStop(0, br(shorts,20)); lg1.addColorStop(1, br(shorts,-30));
  ctx.fillStyle = lg1; ctx.fill();
  // Left boot
  ctx.beginPath();
  ctx.moveTo(-30*s,128*s);
  ctx.bezierCurveTo(-38*s,130*s,-44*s,142*s,-36*s,150*s);
  ctx.bezierCurveTo(-28*s,155*s,-8*s,153*s,-4*s,143*s);
  ctx.bezierCurveTo(-2*s,135*s,-8*s,126*s,-16*s,126*s);
  ctx.closePath();
  ctx.fillStyle = '#0d0d1e'; ctx.fill();

  // Kicking right leg (raised back → forward, ball just kicked)
  ctx.beginPath();
  ctx.moveTo(18*s, 16*s);
  ctx.bezierCurveTo(50*s, 30*s, 78*s, 60*s, 80*s, 100*s);
  ctx.lineTo(64*s, 104*s);
  ctx.bezierCurveTo(64*s, 68*s, 40*s, 42*s, 28*s, 20*s);
  ctx.closePath();
  ctx.fillStyle = lg1; ctx.fill();
  // Right boot (contact with ball)
  ctx.beginPath();
  ctx.moveTo(60*s,98*s);
  ctx.bezierCurveTo(52*s,100*s,40*s,108*s,44*s,116*s);
  ctx.bezierCurveTo(48*s,122*s,74*s,122*s,80*s,114*s);
  ctx.bezierCurveTo(84*s,108*s,80*s,98*s,72*s,96*s);
  ctx.closePath();
  ctx.fillStyle = '#0d0d1e'; ctx.fill();

  // Shorts (hips forward)
  ctx.beginPath();
  ctx.moveTo(-38*s, -12*s);
  ctx.lineTo(38*s, -12*s);
  ctx.bezierCurveTo(44*s, 10*s, 40*s, 30*s, 22*s, 32*s);
  ctx.lineTo(-22*s, 32*s);
  ctx.bezierCurveTo(-40*s, 30*s, -44*s, 10*s, -38*s, -12*s);
  ctx.closePath();
  const shg = ctx.createLinearGradient(-44*s,-12*s,44*s,32*s);
  shg.addColorStop(0,br(shorts,25)); shg.addColorStop(1,br(shorts,-35));
  ctx.fillStyle = shg; ctx.fill();

  // Jersey (body tilted slightly forward)
  ctx.beginPath();
  ctx.moveTo(-46*s, -78*s);
  ctx.bezierCurveTo(-50*s,-52*s,-46*s,-22*s,-38*s,-12*s);
  ctx.lineTo(38*s,-12*s);
  ctx.bezierCurveTo(46*s,-22*s,50*s,-52*s,46*s,-78*s);
  ctx.bezierCurveTo(28*s,-96*s,12*s,-100*s,0,-100*s);
  ctx.bezierCurveTo(-12*s,-100*s,-28*s,-96*s,-46*s,-78*s);
  ctx.closePath();
  const jg = ctx.createLinearGradient(-52*s,-100*s,52*s,-10*s);
  jg.addColorStop(0,br(jersey,40)); jg.addColorStop(0.45,jersey); jg.addColorStop(1,br(jersey,-30));
  ctx.fillStyle = jg; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-16*s,-100*s);
  ctx.bezierCurveTo(-4*s,-80*s,-20*s,-38*s,-38*s,-14*s);
  ctx.lineTo(-44*s,-16*s);
  ctx.bezierCurveTo(-24*s,-42*s,-8*s,-82*s,-24*s,-102*s);
  ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,0.13)'; ctx.fill();

  // Right arm (outstretched for balance, pointing at ball)
  ctx.beginPath();
  ctx.moveTo(46*s,-74*s);
  ctx.bezierCurveTo(78*s,-62*s,102*s,-44*s,112*s,-18*s);
  ctx.bezierCurveTo(114*s,-10*s,104*s,-4*s,98*s,-10*s);
  ctx.bezierCurveTo(88*s,-34*s,66*s,-52*s,38*s,-66*s);
  ctx.closePath();
  const ag = ctx.createLinearGradient(38*s,-74*s,112*s,-18*s);
  ag.addColorStop(0,br(jersey,30)); ag.addColorStop(1,br(jersey,-10));
  ctx.fillStyle=ag; ctx.fill();
  // Right hand
  ctx.beginPath(); ctx.arc(105*s,-14*s,13*s,0,Math.PI*2);
  ctx.fillStyle=skin; ctx.fill();

  // Left arm (back, for rotation)
  ctx.beginPath();
  ctx.moveTo(-46*s,-74*s);
  ctx.bezierCurveTo(-72*s,-68*s,-90*s,-52*s,-88*s,-28*s);
  ctx.bezierCurveTo(-86*s,-18*s,-74*s,-14*s,-68*s,-22*s);
  ctx.bezierCurveTo(-68*s,-44*s,-56*s,-60*s,-34*s,-68*s);
  ctx.closePath();
  ctx.fillStyle=ag; ctx.fill();
  ctx.beginPath(); ctx.arc(-80*s,-22*s,13*s,0,Math.PI*2);
  ctx.fillStyle=skin; ctx.fill();

  // Neck + Head
  ctx.beginPath();
  ctx.moveTo(-12*s,-98*s); ctx.lineTo(12*s,-98*s);
  ctx.lineTo(10*s,-78*s); ctx.lineTo(-10*s,-78*s);
  ctx.closePath(); ctx.fillStyle=skin; ctx.fill();

  ctx.beginPath(); ctx.arc(0,-124*s,37*s,0,Math.PI*2);
  ctx.fillStyle=skin; ctx.fill();
  ctx.beginPath(); ctx.arc(0,-133*s,37*s,Math.PI+0.3,-0.3);
  ctx.closePath(); ctx.fillStyle=hair; ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-13*s,-124*s,6*s,5*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(13*s,-124*s,6*s,5*s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.arc(-12*s,-124*s,3.5*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(12*s,-124*s,3.5*s,0,Math.PI*2); ctx.fill();
  // Determined expression
  ctx.strokeStyle='#333'; ctx.lineWidth=3*s;
  ctx.beginPath(); ctx.moveTo(-14*s,-134*s); ctx.lineTo(-6*s,-130*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(14*s,-134*s); ctx.lineTo(6*s,-130*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-8*s,-112*s); ctx.bezierCurveTo(-4*s,-117*s,4*s,-117*s,8*s,-112*s); ctx.stroke();

  ctx.restore();
}

// ─── OUTLINE EFFECT ──────────────────────────────────────
function withOutlineGlow(ctx, drawFn, glowColor) {
  ctx.save();
  ctx.shadowColor = glowColor || 'rgba(255,255,255,0.7)';
  ctx.shadowBlur = 20;
  drawFn();
  ctx.shadowBlur = 0;
  ctx.restore();
  drawFn();
}

// ─── MAIN CARD DRAW ──────────────────────────────────────
function drawCard(canvas, p) {
  const S = 512, BW = 26;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, S, S);

  // 1. Background (clipped inner)
  drawBackground(ctx, S, BW, p.c1, p.c2);

  // 2. Player glow spotlight
  const figCx = S/2 + (p.pose==='shooting' ? -10 : 0);
  const figCy = S*0.42;
  drawPlayerGlow(ctx, figCx, figCy, p.c1);

  // 3. Player figure (with glow)
  ctx.save();
  rr(ctx, BW, BW, S-BW*2, S-BW*2, 22);
  ctx.clip();

  withOutlineGlow(ctx, () => {
    if (p.pose === 'shooting')
      figureShooting(ctx, figCx, figCy, p.sc||0.88, p.jersey, p.shorts, p.skin, p.hair);
    else
      figureCelebration(ctx, figCx, figCy, p.sc||0.88, p.jersey, p.shorts, p.skin, p.hair);
  }, ha(p.c1, 0.9));

  ctx.restore();

  // 4. Top strip (over player)
  drawTopStrip(ctx, S, BW, p.c1, p.c2, p.pos, p.ovr);

  // 5. Rating badge
  drawRating(ctx, S, BW, p.ovr, p.c1);

  // 6. Legend stamp
  drawLegendStamp(ctx, S, BW);

  // 7. Name strip
  drawNameStrip(ctx, S, BW, p.name, p.team, p.c1, p.c2, p.num, p.flagStripe);

  // 8. Prismatic border (on top of everything)
  drawPrismaticBorder(ctx, S, BW, p.borderAngle||0);

  // 9. Corner sparkles
  ctx.save();
  [[BW+12,BW+55],[S-BW-12,BW+55]].forEach(([sx,sy]) => {
    drawStar5(ctx, sx, sy, 4, 9);
    const sg = ctx.createRadialGradient(sx,sy,0,sx,sy,9);
    sg.addColorStop(0,'#ffffff');
    sg.addColorStop(1,'#FFD700');
    ctx.fillStyle=sg; ctx.fill();
  });
  ctx.restore();
}

  const wrap = document.createElement('div');
  wrap.className = 'card';

  canvas.title = `${p.name} – clique para ampliar`;

  try { drawCard(canvas, p); } catch(e) { console.error(p.name, e); }

  const label = document.createElement('div');
  label.className = 'player-name';
  label.textContent = `${p.name} · ${p.team}`;

  const btn = document.createElement('button');
  btn.className = 'btn';
  btn.textContent = '⬇ Baixar';
  btn.onclick = () => {
    const a = document.createElement('a');
    a.download = `lenda-copa2026-${p.name.toLowerCase().replace(/\s/g,'-')}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };

  // Click canvas to download (convenience)
  canvas.onclick = btn.onclick;

  wrap.append(canvas, label, btn);
  grid.appendChild(wrap);
});
